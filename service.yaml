apiVersion: v1
kind: Service
metadata:
  name: data-analyzer-service
  labels:
    app: data-analyzer
spec:
  type: NodePort
  selector:
    app: data-analyzer
  ports:
    - name: http
      protocol: TCP
      port: 80           # Service port (cluster-internal)
      targetPort: 8501   # Container port
      # nodePort omitted → Kubernetes auto-assigns (30000–32767)
